<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundly — Piano Lessons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3b5bdb;
      --blue-light: #e8edff;
      --blue-hover: #2f4bbd;
      --dark: #0f1117;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --border: #e5e7eb;
      --white: #ffffff;
      --sidebar-width: 300px;
      --green: #16a34a;
      --green-light: #dcfce7;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      background: var(--white);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 50;
    }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.03em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--blue); }
    .nav-divider { width: 1px; height: 20px; background: var(--border); }
    .nav-course-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray);
    }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a {
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray);
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--dark); }

    /* ── LAYOUT ── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--white);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .unit-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .sidebar-header h2 {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .sidebar-header p {
      font-size: 0.8rem;
      color: var(--gray);
      margin-top: 6px;
      line-height: 1.5;
    }

    .lesson-list { padding: 8px 0; }
    .lesson-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
      text-align: left;
      background: none;
      border-top: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      font-family: inherit;
    }
    .lesson-item:hover { background: var(--gray-light); }
    .lesson-item.active {
      background: var(--blue-light);
      border-left-color: var(--blue);
    }
    .lesson-item.completed .lesson-icon { background: var(--green-light); color: var(--green); }

    .lesson-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--blue-light);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .lesson-item.active .lesson-icon {
      background: var(--blue);
      color: #fff;
    }
    .lesson-meta { flex: 1; min-width: 0; }
    .lesson-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lesson-type {
      font-size: 0.75rem;
      color: var(--gray);
      margin-top: 2px;
    }
    .check-icon {
      color: var(--green);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* progress bar in sidebar */
    .progress-wrap {
      padding: 12px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--gray);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── MAIN CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      background: #fafafa;
    }

    .video-area {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 32px 60px;
    }

    .breadcrumb {
      font-size: 0.78rem;
      color: var(--gray);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breadcrumb a { color: var(--blue); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    .video-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .video-meta {
      font-size: 0.82rem;
      color: var(--gray);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .video-meta .dot { width: 3px; height: 3px; background: var(--gray); border-radius: 50%; }

    .video-embed {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }
    .video-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* actions row */
    .video-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .btn-complete {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-complete:hover { background: var(--blue-hover); }
    .btn-complete.done { background: var(--green); }
    .btn-next {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-light);
      color: var(--dark);
      border: 1.5px solid var(--border);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-next:hover { background: var(--border); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

    /* description box */
    .lesson-desc {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
    }
    .lesson-desc h3 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
    .lesson-desc p { font-size: 0.9rem; line-height: 1.7; color: #374151; }

    /* next up card */
    .next-up {
      margin-top: 20px;
      background: var(--blue-light);
      border: 1px solid rgba(59,91,219,0.15);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .next-up-label { font-size: 0.75rem; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .next-up-name { font-size: 0.95rem; font-weight: 700; color: var(--dark); }
    .btn-next-up {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-next-up:hover { background: var(--blue-hover); }

    /* finished state */
    .finished-card {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      gap: 16px;
    }
    .finished-card.visible { display: flex; }
    .finished-icon { font-size: 3rem; }
    .finished-card h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; }
    .finished-card p { font-size: 1rem; color: var(--gray); max-width: 400px; line-height: 1.6; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .video-area { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav aria-label="Main navigation">
    <div class="nav-left">
      <a class="nav-logo">Sound<span>ly</span></a>
      <div class="nav-divider" aria-hidden="true"></div>
      <span class="nav-course-title">Piano for Every Learner</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar" aria-label="Lesson list">
      <div class="sidebar-header">
        <div class="unit-badge">♪ Unit 1</div>
        <h2>Piano Basics</h2>
        <p>Learn to play piano by touch, sound, and feel.</p>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Your progress</span>
          <span id="progress-text">0 / 5</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="5">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="lesson-list" id="lesson-list">
        <!-- generated by JS -->
      </div>
    </aside>

    <!-- MAIN -->
    <main class="content" id="main-content">
      <div class="video-area" id="video-area">
        <!-- generated by JS -->
      </div>
    </main>

  </div>

  <script>
    const lessons = [
      { id: 1, title: "Lesson 1", shortTitle: "Lesson 1", youtubeId: "tzjcmi5oY50" },
      { id: 2, title: "Lesson 2", shortTitle: "Lesson 2", youtubeId: "h9nsleigwfM" },
      { id: 3, title: "Lesson 3", shortTitle: "Lesson 3", youtubeId: "PZfYrIBslgo" },
      { id: 4, title: "Lesson 4", shortTitle: "Lesson 4", youtubeId: "kIoeaQUVgvw" },
      { id: 5, title: "Lesson 5", shortTitle: "Lesson 5", youtubeId: "JLUcTBVM0pI" }
    ];

    let currentLesson = 0;
    let completed = new Set();

    function getYouTubeEmbed(id) {
      return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&color=white`;
    }

    function renderSidebar() {
      const list = document.getElementById('lesson-list');
      list.innerHTML = lessons.map((l, i) => `
        <button
          class="lesson-item ${i === currentLesson ? 'active' : ''} ${completed.has(i) ? 'completed' : ''}"
          onclick="selectLesson(${i})"
          aria-current="${i === currentLesson ? 'true' : 'false'}"
          aria-label="${l.shortTitle}${completed.has(i) ? ' (completed)' : ''}"
        >
          <div class="lesson-icon">${completed.has(i) ? '✓' : i + 1}</div>
          <div class="lesson-meta">
            <div class="lesson-name">${l.shortTitle}</div>
            <div class="lesson-type">Video · ~5 min</div>
          </div>
          ${completed.has(i) ? '<span class="check-icon" aria-hidden="true">✓</span>' : ''}
        </button>
      `).join('');

      const done = completed.size;
      const pct = Math.round((done / lessons.length) * 100);
      document.getElementById('progress-text').textContent = `${done} / ${lessons.length}`;
      const fill = document.getElementById('progress-fill');
      fill.style.width = pct + '%';
      fill.parentElement.setAttribute('aria-valuenow', done);
    }

    function renderVideo() {
      const l = lessons[currentLesson];
      const isLast = currentLesson === lessons.length - 1;
      const nextLesson = lessons[currentLesson + 1];
      const isDone = completed.has(currentLesson);

      document.getElementById('video-area').innerHTML = `
        <div class="breadcrumb">
          <a href="index.html">Soundly</a>
          <span aria-hidden="true">›</span>
          <span>Piano Basics</span>
          <span aria-hidden="true">›</span>
          <span>Lesson ${l.id}</span>
        </div>

        <h1 class="video-title">${l.title}</h1>
        <div class="video-meta">
          <span>Unit 1</span>
          <span class="dot" aria-hidden="true"></span>
          <span>Video lesson</span>
          <span class="dot" aria-hidden="true"></span>
          <span>~5 minutes</span>
        </div>

        <div class="video-embed">
          <iframe
            src="${getYouTubeEmbed(l.youtubeId)}"
            title="${l.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>

        <div class="video-actions">
          <button
            class="btn-complete ${isDone ? 'done' : ''}"
            onclick="markComplete()"
            id="btn-complete"
          >
            ${isDone ? '✓ Completed' : '✓ Mark as complete'}
          </button>
          <button
            class="btn-next"
            onclick="nextLesson()"
            ${isLast ? 'disabled' : ''}
            aria-label="${isLast ? 'No next lesson' : 'Go to next lesson'}"
          >
            Next →
          </button>
        </div>

        ${!isLast ? `
        <div class="next-up">
          <div>
            <div class="next-up-label">Up next</div>
            <div class="next-up-name">${nextLesson.shortTitle}</div>
          </div>
          <button class="btn-next-up" onclick="nextLesson()">Continue →</button>
        </div>` : `
        <div class="next-up" style="justify-content:center; text-align:center;">
          <div>
            <div class="next-up-label" style="text-align:center;">🎉 You've reached the end!</div>
            <div class="next-up-name">Amazing work — you've completed all 5 lessons.</div>
          </div>
        </div>`}
      `;
    }

    function selectLesson(idx) {
      currentLesson = idx;
      renderSidebar();
      renderVideo();
      document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function markComplete() {
      completed.add(currentLesson);
      renderSidebar();
      renderVideo();
    }

    function nextLesson() {
      if (currentLesson < lessons.length - 1) {
        selectLesson(currentLesson + 1);
      }
    }

    // init
    renderSidebar();
    renderVideo();
  </script>

</body>
</html>
